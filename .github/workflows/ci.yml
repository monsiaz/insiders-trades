name: CI — Build & Type Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & TypeScript check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: Generate Prisma client (with stub DATABASE_URL)
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: TypeScript check
        run: npx tsc --noEmit
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db

      - name: Next.js build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          NEXTAUTH_SECRET: ci-placeholder-secret-32chars-min
          CRON_SECRET: ci-placeholder
          OPENAI_API_KEY: sk-placeholder
          BLOB_READ_WRITE_TOKEN: placeholder
